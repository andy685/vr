<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>头号空间 · 资金流通全景图</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, "Microsoft YaHei", sans-serif;
      background: #f4f6f8;
      display: flex;
      justify-content: center;
      padding: 32px 16px 48px;
    }
    .wrapper {
      width: 100%;
      max-width: 1020px;
      background: #ffffff;
      border-radius: 12px;
      box-shadow: 0 2px 24px rgba(0,0,0,.06);
      overflow: hidden;
    }
    .title-bar {
      background: linear-gradient(135deg, #1e293b 0%, #334155 100%);
      padding: 28px 36px;
      text-align: center;
    }
    .title-bar .tag {
      display: inline-block;
      font-size: 11px;
      letter-spacing: 2px;
      color: #60a5fa;
      border: 1px solid rgba(96,165,250,.3);
      border-radius: 20px;
      padding: 4px 16px;
      margin-bottom: 10px;
      text-transform: uppercase;
    }
    .title-bar h1 {
      font-size: 26px;
      font-weight: 700;
      color: #f1f5f9;
      letter-spacing: 1px;
    }
    .title-bar .sub {
      font-size: 13px;
      color: #94a3b8;
      margin-top: 6px;
    }
    .diagram-body {
      padding: 16px 8px 12px;
      display: flex;
      justify-content: center;
      background: #fafbfc;
    }
    svg {
      width: 100%;
      height: auto;
      max-width: 960px;
    }
    .legend-bar {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      padding: 18px 24px 24px;
      border-top: 1px solid #e8ecf0;
      background: #ffffff;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: #475569;
    }
    .legend-color {
      width: 28px;
      height: 4px;
      border-radius: 2px;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
<div class="wrapper">

  <div class="title-bar">
    <div class="tag">Money Flow</div>
    <h1>头号空间 · 资金流通全景图</h1>
    <div class="sub">C端消费 → 商家运营 → 平台枢纽 → 代理分润，全链路资金流转</div>
  </div>

  <div class="diagram-body">
    <svg viewBox="0 0 960 780" xmlns="http://www.w3.org/2000/svg">

      <!-- ========== 全局箭头标记 ========== -->
      <defs>
        <marker id="arrowBlue"   markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#3B82F6"/></marker>
        <marker id="arrowGreen"  markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#10B981"/></marker>
        <marker id="arrowAmber"  markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#F59E0B"/></marker>
        <marker id="arrowCyan"   markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#06B6D4"/></marker>
        <marker id="arrowRed"    markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#EF4444"/></marker>
      </defs>

      <!--
        布局说明（全部使用 ViewBox 坐标系）：
          - C端用户   y: 30 ~ 122   (高度 92)
          - 商家/门店  y: 260 ~ 352  (高度 92)
          - 平台运营   y: 470 ~ 570  (高度 100)
          - 代理商    y: 670 ~ 762  (高度 92)
          - 银行账户   x: 700, y: 330 ~ 408  (商家右下方，接收提现)

          竖向主线 x=480 连接四张卡片
          左右标注全部独立于卡片区域，空间充足不会重叠
      -->

      <!-- ================================================================ -->
      <!-- ① 消费付款标注 —— 放在C端和商家之间，靠左 -->
      <!-- ================================================================ -->
      <rect x="168" y="160" width="200" height="40" rx="6" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1.2"/>
      <text x="268" y="178" text-anchor="middle" font-size="13" fill="#3B82F6" font-weight="700">① 消费付款</text>
      <text x="268" y="194" text-anchor="middle" font-size="10" fill="#6B7280">微信/支付宝/现金 · 100%归商家</text>

      <!-- ================================================================ -->
      <!-- ② 采购游戏豆标注 —— 商家和平台之间，靠左 -->
      <!-- ================================================================ -->
      <rect x="168" y="380" width="208" height="40" rx="6" fill="#ECFDF5" stroke="#A7F3D0" stroke-width="1.2"/>
      <text x="272" y="398" text-anchor="middle" font-size="13" fill="#10B981" font-weight="700">② 采购游戏豆</text>
      <text x="272" y="414" text-anchor="middle" font-size="10" fill="#6B7280">¥1/豆 · 微信/支付宝/对公转账</text>

      <!-- ================================================================ -->
      <!-- ③ 分润标注 —— 平台和代理商之间，靠左 -->
      <!-- ================================================================ -->
      <rect x="168" y="590" width="210" height="40" rx="6" fill="#FFF7ED" stroke="#FED7AA" stroke-width="1.2"/>
      <text x="273" y="608" text-anchor="middle" font-size="13" fill="#F59E0B" font-weight="700">③ 代理分润</text>
      <text x="273" y="624" text-anchor="middle" font-size="10" fill="#6B7280">按辖区采购额 · 阶梯 3%~12% · T+1月结</text>

      <!-- ================================================================ -->
      <!-- ④ 提现标注 —— 放在商家→银行卡箭头正上方，与银行卡保持间距 -->
      <!-- ================================================================ -->
      <rect x="598" y="288" width="148" height="40" rx="6" fill="#ECFEFF" stroke="#A5F3FC" stroke-width="1.2"/>
      <text x="672" y="306" text-anchor="middle" font-size="13" fill="#06B6D4" font-weight="700">④ 商家提现</text>
      <text x="672" y="322" text-anchor="middle" font-size="10" fill="#6B7280">扣手续费 · 拉卡拉打款</text>

      <!-- ================================================================ -->
      <!-- ⑤ 退款标注 —— 右上角最远区域，完全避开弧线和所有卡片 -->
      <!-- ================================================================ -->
      <rect x="720" y="20" width="210" height="40" rx="6" fill="#FEF2F2" stroke="#FECACA" stroke-width="1.2"/>
      <text x="825" y="38" text-anchor="middle" font-size="13" fill="#EF4444" font-weight="700">⑤ 退款回流</text>
      <text x="825" y="54" text-anchor="middle" font-size="10" fill="#6B7280">未结算原路退 · 已结算线下退</text>

      <!-- ================================================================ -->
      <!-- ⑤ 退款箭头 —— 商家右上角 → C端右上角，大弧绕行避开银行卡区域 -->
      <!-- ================================================================ -->
      <path d="M 582,275 C 860,270 860,50 582,52"
            fill="none" stroke="#EF4444" stroke-width="2.5"
            stroke-dasharray="8,5" marker-end="url(#arrowRed)"/>

      <!-- ================================================================ -->
      <!-- ④ 提现箭头 —— 商家右侧 → 银行卡左上角（斜向连线） -->
      <!-- ================================================================ -->
      <line x1="582" y1="306" x2="698" y2="350" stroke="#06B6D4" stroke-width="2.8" marker-end="url(#arrowCyan)"/>

      <!-- ================================================================ -->
      <!-- ① 消费付款竖向主线 -->
      <!-- ================================================================ -->
      <!-- C端底部连线到商家顶部 -->
      <line x1="480" y1="122" x2="480" y2="260" stroke="#3B82F6" stroke-width="3.2" marker-end="url(#arrowBlue)"/>

      <!-- ================================================================ -->
      <!-- ② 采购游戏豆竖向主线 -->
      <!-- ================================================================ -->
      <line x1="480" y1="352" x2="480" y2="470" stroke="#10B981" stroke-width="3.2" marker-end="url(#arrowGreen)"/>

      <!-- ================================================================ -->
      <!-- ③ 分润竖向主线 -->
      <!-- ================================================================ -->
      <line x1="480" y1="570" x2="480" y2="670" stroke="#F59E0B" stroke-width="3.2" marker-end="url(#arrowAmber)"/>

      <!-- ================================================================ -->
      <!-- 角色卡片 -->
      <!-- ================================================================ -->

      <!-- ── C端用户 ── -->
      <g transform="translate(380, 30)">
        <rect x="0" y="0" width="200" height="92" rx="12" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1.5"/>
        <rect x="0" y="0" width="200" height="5" rx="3" fill="#3B82F6"/>
        <circle cx="28" cy="36" r="16" fill="#DBEAFE"/>
        <text x="28" y="41" text-anchor="middle" font-size="16">👤</text>
        <text x="54" y="35" font-size="15" font-weight="700" fill="#1E40AF">C 端用户</text>
        <text x="54" y="52" font-size="11" fill="#6B7280">游客 · 会员</text>
        <text x="28" y="73" font-size="11" fill="#4B5563">• 到店消费 VR 体验</text>
        <text x="28" y="88" font-size="11" fill="#4B5563">• 充值会员余额 / 按次付费</text>
      </g>

      <!-- ── 商家/门店 ── -->
      <g transform="translate(380, 260)">
        <rect x="0" y="0" width="200" height="92" rx="12" fill="#FFF7ED" stroke="#FED7AA" stroke-width="1.5"/>
        <rect x="0" y="0" width="200" height="5" rx="3" fill="#F59E0B"/>
        <circle cx="28" cy="36" r="16" fill="#FEF3C7"/>
        <text x="28" y="41" text-anchor="middle" font-size="16">🏪</text>
        <text x="54" y="35" font-size="15" font-weight="700" fill="#92400E">商家 / 门店</text>
        <text x="54" y="52" font-size="11" fill="#6B7280">收银 · 运营</text>
        <text x="28" y="73" font-size="11" fill="#4B5563">• 收银 ¥100% 归商家</text>
        <text x="28" y="88" font-size="11" fill="#4B5563">• 消耗游戏豆启动 VR 游戏</text>
      </g>

      <!-- ── 平台运营 ── -->
      <g transform="translate(380, 470)">
        <rect x="0" y="0" width="200" height="100" rx="12" fill="#ECFDF5" stroke="#A7F3D0" stroke-width="1.5"/>
        <rect x="0" y="0" width="200" height="5" rx="3" fill="#10B981"/>
        <circle cx="28" cy="36" r="16" fill="#D1FAE5"/>
        <text x="28" y="41" text-anchor="middle" font-size="16">🏢</text>
        <text x="54" y="33" font-size="15" font-weight="700" fill="#065F46">平台运营</text>
        <text x="54" y="50" font-size="11" fill="#6B7280">超管 · 财务中心</text>
        <text x="16" y="76" font-size="11" fill="#4B5563">• 游戏豆统一定价 ¥1/豆</text>
        <text x="16" y="92" font-size="11" fill="#4B5563">• 对账 · 分账 · 打款</text>
      </g>

      <!-- ── 代理商 ── -->
      <g transform="translate(380, 670)">
        <rect x="0" y="0" width="200" height="92" rx="12" fill="#F5F3FF" stroke="#DDD6FE" stroke-width="1.5"/>
        <rect x="0" y="0" width="200" height="5" rx="3" fill="#8B5CF6"/>
        <circle cx="28" cy="36" r="16" fill="#EDE9FE"/>
        <text x="28" y="41" text-anchor="middle" font-size="16">🤝</text>
        <text x="54" y="35" font-size="15" font-weight="700" fill="#5B21B6">代理商</text>
        <text x="54" y="52" font-size="11" fill="#6B7280">城市 · 区域 · 省级</text>
        <text x="28" y="73" font-size="11" fill="#4B5563">• 按辖区采购额阶梯分润</text>
        <text x="28" y="88" font-size="11" fill="#4B5563">• 次月 15 日拉卡拉打款</text>
      </g>

      <!-- ── 银行账户 ── 放在商家右下方，接收提现，与④标注保持间距 -->
      <g transform="translate(700, 330)">
        <rect x="0" y="0" width="190" height="78" rx="12" fill="#ECFEFF" stroke="#A5F3FC" stroke-width="1.5"/>
        <rect x="0" y="0" width="190" height="5" rx="3" fill="#06B6D4"/>
        <circle cx="28" cy="34" r="16" fill="#CFFAFE"/>
        <text x="28" y="39" text-anchor="middle" font-size="16">🏦</text>
        <text x="54" y="33" font-size="15" font-weight="700" fill="#155E75">银行账户</text>
        <text x="54" y="50" font-size="11" fill="#6B7280">拉卡拉 T+1 打款</text>
        <text x="28" y="69" font-size="11" fill="#4B5563">• 商家提现收款</text>
      </g>

      <!-- ================================================================ -->
      <!-- 流程编号圆标 -->
      <!-- ================================================================ -->
      <!-- ① 在C端→商家连线上 -->
      <circle cx="500" cy="191" r="11" fill="#3B82F6"/>
      <text x="500" y="196" text-anchor="middle" font-size="12" fill="#fff" font-weight="700">①</text>

      <!-- ② 在商家→平台连线上 -->
      <circle cx="500" cy="411" r="11" fill="#10B981"/>
      <text x="500" y="416" text-anchor="middle" font-size="12" fill="#fff" font-weight="700">②</text>

      <!-- ③ 在平台→代理商连线上 -->
      <circle cx="500" cy="620" r="11" fill="#F59E0B"/>
      <text x="500" y="625" text-anchor="middle" font-size="12" fill="#fff" font-weight="700">③</text>

      <!-- ④ 在提现线上（商家→银行卡连线中点偏左） -->
      <circle cx="630" cy="320" r="11" fill="#06B6D4"/>
      <text x="630" y="325" text-anchor="middle" font-size="12" fill="#fff" font-weight="700">④</text>

      <!-- ⑤ 在退款弧线起点（商家右上角） -->
      <circle cx="618" cy="258" r="11" fill="#EF4444"/>
      <text x="618" y="263" text-anchor="middle" font-size="12" fill="#fff" font-weight="700">⑤</text>

    </svg>
  </div>

  <div class="legend-bar">
    <div class="legend-item">
      <div class="legend-color" style="background:#3B82F6;"></div>
      <span><b>① C端消费流</b> — 用户付款→商家，100%归商家</span>
    </div>
    <div class="legend-item">
      <div class="legend-color" style="background:#10B981;"></div>
      <span><b>② 游戏豆采购流</b> — 商家买豆→平台，¥1/豆</span>
    </div>
    <div class="legend-item">
      <div class="legend-color" style="background:#F59E0B;"></div>
      <span><b>③ 代理分润流</b> — 平台→代理商，T+1月结</span>
    </div>
    <div class="legend-item">
      <div class="legend-color" style="background:#06B6D4;"></div>
      <span><b>④ 商家提现流</b> — 商家→银行卡，扣手续费</span>
    </div>
    <div class="legend-item">
      <div class="legend-color" style="background:#EF4444;"></div>
      <span><b>⑤ 退款回流</b> — 未结算原路退 / 已结算线下退</span>
    </div>
  </div>

</div>
</body>
</html>
