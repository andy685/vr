<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>头号空间 - 文档中心</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
    min-height: 100vh;
    color: #e2e8f0;
  }
  .container {
    max-width: 800px;
    margin: 0 auto;
    padding: 60px 24px;
  }
  .header {
    text-align: center;
    margin-bottom: 48px;
  }
  .header h1 {
    font-size: 36px;
    background: linear-gradient(135deg, #818cf8, #c084fc, #e879f9);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 8px;
  }
  .header p {
    color: #94a3b8;
    font-size: 15px;
  }
  /* 一级标题：分区 */
  .section {
    margin-bottom: 40px;
  }
  .section-title {
    font-size: 14px;
    font-weight: 800;
    color: #818cf8;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 14px;
    padding-left: 14px;
    border-left: 3px solid #818cf8;
  }
  /* 二级标题：卡片列表 */
  .card-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .card {
    background: rgba(30, 41, 59, 0.8);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(99, 102, 241, 0.2);
    border-radius: 12px;
    padding: 20px 22px;
    transition: all 0.3s ease;
    cursor: pointer;
    text-decoration: none;
    display: block;
  }
  .card:hover {
    border-color: rgba(99, 102, 241, 0.6);
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(99, 102, 241, 0.15);
  }
  .card h3 {
    font-size: 17px;
    margin-bottom: 4px;
    color: #e2e8f0;
    font-weight: 700;
  }
  .card .badge {
    display: inline-block;
    font-size: 11px;
    padding: 2px 10px;
    border-radius: 20px;
    background: rgba(99, 102, 241, 0.2);
    color: #a5b4fc;
    margin-bottom: 8px;
  }
  .card .desc {
    font-size: 13px;
    color: #94a3b8;
    line-height: 1.6;
  }
  .footer {
    text-align: center;
    margin-top: 48px;
    color: #475569;
    font-size: 13px;
  }
  .update-time {
    text-align: center;
    color: #64748b;
    font-size: 13px;
    margin-top: 32px;
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>头号空间 · 文档中心</h1>
    <p>VR 头号空间项目文档在线浏览</p>
  </div>

  <!-- ========== 唯一需求文档 ========== -->
  <div class="section">
    <div class="section-title">唯一需求文档</div>
    <div class="card-list">
      <a class="card" href="PRD-完整版.html" target="_blank">
        <h3>头号空间产品需求文档（统一版）</h3>
        <p class="desc">唯一开发依据：已合并产品功能、支付、对账、分账、结算、退款、游戏豆、会员资产、代理商分润和 CP 结算规则。</p>
      </a>
    </div>
  </div>

  <!-- ========== 技术文档 ========== -->
  <div class="section">
    <div class="section-title">技术文档</div>
    <div class="card-list">
      <a class="card" href="游戏SDK开发文档.html" target="_blank">
        <span class="badge">v1.1</span>
        <h3>游戏 SDK 开发文档</h3>
        <p class="desc">SDK 接入、统计、异常与会话边界：涵盖会话管理、心跳与设备健康、异常上报、离线缓存、游戏豆自动退还、安全通信、多人 Session 规则、启动超时配置等核心能力，以及事件体系、接口设计、数据模型和运行时流程。</p>
      </a>
    </div>
  </div>

  <div class="update-time">
    旧专题文档仅作归档材料保留，不再作为产品需求或开发依据。
  </div>

  <div class="footer">
    Powered by GitHub Pages
  </div>
</div>
</body>
</html>
